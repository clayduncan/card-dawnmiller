  <style>
    :root{
      --bg:#070a12;
      --stroke:rgba(255,255,255,.10);
      --text:#ffffff;
      --muted:rgba(255,255,255,.70);
      --btn:#2c6ef6;
      --btn2:rgba(255,255,255,.08);
      --shadow:0 26px 80px rgba(0,0,0,.50);
      --r:22px;
    }
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 600px at 50% -10%, rgba(44,110,246,.35), transparent 60%),
        var(--bg);
      color:var(--text);
    }

    .wrap{max-width:460px;margin:0 auto;padding:18px 14px 34px}

    .topbar{display:flex;align-items:center;justify-content:space-between;margin:6px 0 16px}
    .logo img{height:30px;width:auto;display:block}

    .sharebtn{
      display:flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:12px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 22px rgba(0,0,0,.25);
      text-decoration:none;color:#fff;
      font-weight:900;font-size:13px;letter-spacing:.2px;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .sharebtn svg{
      width:18px;height:18px;
      stroke:#fff;stroke-width:2.25;fill:none;
      stroke-linecap:round;stroke-linejoin:round;
      opacity:.95;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid var(--stroke);
      border-radius:var(--r);
      padding:18px;
      box-shadow:var(--shadow);
    }

    .hero{display:flex;gap:16px;align-items:center}
    .photo{
      width:128px;height:128px;border-radius:24px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      overflow:hidden;flex:0 0 128px;
      box-shadow:0 14px 30px rgba(0,0,0,.38);
    }
    .photo img{width:100%;height:100%;object-fit:cover;display:block}

    h1{margin:0;font-size:26px;line-height:1.08}
    .sub{margin-top:10px;font-size:14px;line-height:1.45;color:var(--muted)}
    .phone{display:inline-block;margin-top:6px;font-weight:900;color:#fff;text-decoration:none;opacity:.95}

    /* Social icons */
    .social{display:flex;justify-content:center;gap:16px;margin-top:16px}
    .social a{
      width:52px;height:52px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 22px rgba(0,0,0,.35);
      text-decoration:none;
    }
    .social svg{width:30px;height:30px;display:block;fill:#fff}

    .ig{background: radial-gradient(circle at 30% 110%, #feda75 0%, #fa7e1e 25%, #d62976 50%, #962fbf 75%, #4f5bd5 100%);}
    .fb{background:#1877F2;}
    .in{background:#0A66C2;}
    .web{background:#ff3d8d;}
    .star{background:#FBBC04;}

    .cta{display:grid;gap:12px;margin-top:18px}

    .cta-split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }
    .btn.small{
      padding:14px 10px;
      border-radius:16px;
      font-size:14px;
    }
    .btn{
      display:flex;align-items:center;justify-content:center;
      padding:16px 14px;border-radius:16px;
      text-decoration:none;color:#fff;font-weight:900;
      border:1px solid rgba(255,255,255,.10);
      letter-spacing:.4px;
    }
    .btn.primary{background:var(--btn)}
    .btn.secondary{
      background:rgba(44,110,246,.45);
      border:1px solid rgba(44,110,246,.50);
    }

    /* Review buttons styling */
    .btn.review-read{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
    }
    .btn.review-ask{
      background:rgba(44,110,246,.18);
      border:1px solid rgba(44,110,246,.35);
    }

    /* Action bar */
    .actionbar{
      margin-top:16px;padding:14px 12px;border-radius:18px;
      background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .act{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
      padding:12px 8px;border-radius:14px;text-decoration:none;color:#fff;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      box-shadow:0 10px 22px rgba(0,0,0,.25);
      -webkit-tap-highlight-color: transparent;
      user-select:none;
      min-height:82px;
    }
    .act svg{width:26px;height:26px;fill:#fff;opacity:.95}
    .act span{font-size:12px;font-weight:900;letter-spacing:.2px}

<script>
  function shareLink(){
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: 'Connect with Dawn', url });
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(url);
      alert('Link copied.');
    } else {
      prompt('Copy this link:', url);
    }
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  }
</script>
